name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Set up Gemini API key
      - name: Set up Gemini Key
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties

      # Set up AdMob Keys
      - name: Set up AdMob Keys
        run: |
          echo "ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }}" >> local.properties
          echo "ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID }}" >> local.properties

      # Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Version Code
        id: version
        run: |
          TIMESTAMP=$(date +%s)
          echo "versionCode=$((TIMESTAMP / 60))" >> $GITHUB_OUTPUT
          echo "versionName=1.0.$((TIMESTAMP / 3600))" >> $GITHUB_OUTPUT

      - name: Update App Version
        run: |
          sed -i "s/versionCode = .*/versionCode = ${{ steps.version.outputs.versionCode }}/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"${{ steps.version.outputs.versionName }}\"/" app/build.gradle.kts
          cat app/build.gradle.kts | grep version

      # Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # Verify debug APK exists
      - name: Verify Debug APK
        run: |
          ls -la app/build/outputs/apk/debug/
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "::error::Debug APK not found!"
            exit 1
          fi

      # Decode keystore for release signing
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      # Build release AAB (signed)
      - name: Build release AAB
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      # Verify release AAB exists
      - name: Verify Release AAB
        run: |
          ls -la app/build/outputs/bundle/release/
          if [ ! -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            echo "::error::Release AAB not found!"
            exit 1
          fi

      # Clean up decoded keystore (don't leave it on the runner filesystem)
      - name: Remove decoded keystore
        if: always()
        run: rm -f app/release.jks

      # Upload release AAB as a workflow artifact (download from Actions tab)
      - name: Upload Release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      # Set up Node.js for Firebase
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Upload debug APK to Firebase App Distribution for testers
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: |
            Auto-generated build
            Version: ${{ steps.version.outputs.versionName }}
            Build: ${{ steps.version.outputs.versionCode }}